user root;
worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 64M;

    access_log /dev/stdout;

    # ──────────────────────────────────────────────────
    # Instance subdomains — *.yourdomain.com
    # Matches any request where the Host has a subdomain
    # AND the corresponding instance directory exists.
    # ──────────────────────────────────────────────────
    server {
        listen 8080;
        server_name ~^(?<slug>[^.]+)\..+$;

        # Only activate if instance directory exists on the volume
        set $instance_root /data/instances/$slug;

        # If instance dir doesn't exist, fall through to default server
        if (!-d $instance_root) {
            return 444;
        }

        # If instance is paused, show maintenance page
        if (-f $instance_root/.paused) {
            return 503;
        }

        root $instance_root;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Security: block sensitive files
        location ~ /\. { deny all; }
        location ~* \.(db|sqlite|sql|sh|env|bak|log)$ { deny all; }

        error_page 503 @maintenance;
        location @maintenance {
            default_type text/html;
            return 503 '<html><body style="font-family:Inter,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#09090B;color:#FAFAFA;"><div style="text-align:center"><h1 style="font-size:32px;font-weight:700;margin:0;">Under Maintenance</h1><p style="color:#71717A;margin-top:8px;">This site is temporarily paused.</p></div></body></html>';
        }
    }

    # ──────────────────────────────────────────────────
    # Main VoxelSwarm app — yourdomain.com (no subdomain)
    # Also catches any subdomain without a matching instance.
    # ──────────────────────────────────────────────────
    server {
        listen 8080 default_server;
        server_name _;

        root /app;
        index index.php;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Serve pre-built CSS/JS assets
        location /build/ {
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Serve fonts
        location /fonts/ {
            try_files $uri =404;
            expires 30d;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Security: block sensitive files
        location ~ /\. { deny all; }
        location ~* \.(db|sqlite|sql|sh|env|bak|log)$ { deny all; }
    }
}
