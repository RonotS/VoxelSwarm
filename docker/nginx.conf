user root;
worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 64M;

    access_log /dev/stdout;

    # ──────────────────────────────────────────────────
    # Extract the first subdomain from the Host header.
    # map runs BEFORE server selection, giving us $slug.
    # ──────────────────────────────────────────────────
    map $host $slug {
        default "";
        # Only match: <slug>.<basedomain>  (exactly one sub-level)
        # This avoids matching Railway domains like x.up.railway.app
        "~^(?<s>[^.]+)\.(?<rest>[^.]+\.[^.]+)$" $s;
    }

    server {
        listen 8080 default_server;
        server_name _;

        # ── Decide the document root ──
        # If slug is set AND instance dir exists → serve instance
        # Otherwise → serve the main VoxelSwarm app
        set $app_root /app;

        if ($slug != "") {
            set $app_root /data/instances/$slug;
        }

        # If the resolved instance dir doesn't exist, fall back to /app
        # (handles Railway domains and unknown subdomains)
        if (!-d $app_root) {
            set $app_root /app;
        }

        root $app_root;
        index index.php index.html;

        # ── Paused instance check ──
        if (-f $app_root/.paused) {
            return 503;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Serve pre-built CSS/JS assets
        location /build/ {
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Serve fonts
        location /fonts/ {
            try_files $uri =404;
            expires 30d;
        }

        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Security: block sensitive files
        location ~ /\. { deny all; }
        location ~* \.(db|sqlite|sql|sh|env|bak|log)$ { deny all; }

        error_page 503 @maintenance;
        location @maintenance {
            default_type text/html;
            return 503 '<html><body style="font-family:Inter,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#09090B;color:#FAFAFA;"><div style="text-align:center"><h1 style="font-size:32px;font-weight:700;margin:0;">Under Maintenance</h1><p style="color:#71717A;margin-top:8px;">This site is temporarily paused.</p></div></body></html>';
        }
    }
}
